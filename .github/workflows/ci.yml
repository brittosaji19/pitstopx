name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install frontend deps
        run: npm ci

      - name: Frontend unit tests
        run: npm test

      - name: Frontend typecheck
        run: npm run check

      - name: Frontend build
        run: npm run build

      - name: Rust fmt
        working-directory: src-tauri
        run: cargo fmt --check

      - name: Rust clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

      # `cargo clippy --all-targets` + `cargo test` (lib + bin) already compile
      # and link every Rust target on each OS, so the bin is build-verified here.
      # Producing installers/bundles is release.yml's job, not CI's.
      - name: Rust tests
        working-directory: src-tauri
        run: cargo test
