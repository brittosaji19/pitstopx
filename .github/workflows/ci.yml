name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend deps
        run: npm install

      - name: Frontend unit tests
        run: npm test

      - name: Rust fmt
        working-directory: src-tauri
        run: cargo fmt --check

      - name: Rust clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: Rust tests
        working-directory: src-tauri
        run: cargo test

      # Icons are committed under src-tauri/icons and referenced by
      # tauri.conf.json, so no generation step is needed (make-icon.mjs requires
      # a rasterizer that isn't installed on CI runners).
      - name: Build app (Tauri bundle)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Attach installers to a GitHub release when the workflow is a release.
          tagName: ${{ github.event_name == 'release' && github.ref_name || '' }}
          releaseName: ${{ github.event_name == 'release' && 'PitStopX __VERSION__' || '' }}
