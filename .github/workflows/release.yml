name: Release builds

# Produces installable bundles for Windows (x64 + arm64), macOS (Apple Silicon +
# Intel, .dmg) and Debian/Ubuntu (deb).
# - Runs only manually: a published GitHub release, or a manual dispatch.
#   (Does NOT auto-trigger on `v*` tag pushes.)
# - On a release, bundles are attached to that (draft) release.
# - Always uploads the bundles as workflow artifacts so dispatch runs are
#   downloadable without a release.
#
# Test/lint gating lives in ci.yml; this workflow is build-only.

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build:
    # tauri-action creates/updates the (draft) release and uploads assets.
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            args: "--target x86_64-pc-windows-msvc --bundles nsis,msi"
          - name: windows-arm64
            os: windows-latest
            target: aarch64-pc-windows-msvc
            args: "--target aarch64-pc-windows-msvc --bundles nsis,msi"
          - name: macos-arm64
            os: macos-latest # Apple Silicon
            target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin --bundles dmg"
          - name: macos-x64
            os: macos-14 # Intel
            target: x86_64-apple-darwin
            args: "--target x86_64-apple-darwin --bundles dmg"
          - name: debian-x64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: "--target x86_64-unknown-linux-gnu --bundles deb"

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # ubuntu-22.04 (not 24.04) keeps glibc old enough for Debian 12 (bookworm).
      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf

      # Cross-compiling to aarch64-windows: `ring` (via rustls) needs clang to
      # assemble. LLVM is preinstalled on the windows runner image.
      - name: Put LLVM on PATH (Windows arm64)
        if: matrix.name == 'windows-arm64'
        shell: pwsh
        run: Add-Content -Path $env:GITHUB_PATH -Value "C:\Program Files\LLVM\bin"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.name }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend deps
        run: npm ci

      # tauri-action runs `beforeBuildCommand` (npm run build) then bundles.
      - name: Build app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS builds are produced UNSIGNED (no Apple signing env passed), so
          # the bundler never runs codesign/notarization. Gatekeeper will warn on
          # first launch (right-click > Open to bypass). To enable signing later,
          # add an `env:` block with APPLE_CERTIFICATE / APPLE_CERTIFICATE_PASSWORD
          # / APPLE_SIGNING_IDENTITY (+ APPLE_ID / APPLE_PASSWORD / APPLE_TEAM_ID
          # for notarization) from repo secrets.
        with:
          args: ${{ matrix.args }}
          # Attach to a (draft) release only on tag/release runs; no-op otherwise.
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: ${{ github.ref_type == 'tag' && 'PitStopX __VERSION__' || '' }}
          releaseDraft: true
          prerelease: false

      - name: Upload bundles as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pitstopx-${{ matrix.name }}
          if-no-files-found: error
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
