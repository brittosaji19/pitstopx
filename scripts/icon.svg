<?xml version="1.0" encoding="UTF-8"?>
<!--
  PitStopX app icon: a speedometer gauge over a checkered finish-line band.
  Single source of truth; `scripts/make-icon.mjs` (or `npx tauri icon
  scripts/icon.svg`) rasterizes this into every required size/format.
-->
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2C2C30"/>
      <stop offset="1" stop-color="#141416"/>
    </linearGradient>
    <linearGradient id="arc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E78E6A"/>
      <stop offset="1" stop-color="#CE6841"/>
    </linearGradient>
    <clipPath id="round">
      <rect x="32" y="32" width="448" height="448" rx="108"/>
    </clipPath>
  </defs>

  <!-- Rounded-square backdrop -->
  <rect x="32" y="32" width="448" height="448" rx="108" fill="url(#bg)"/>

  <!-- Checkered finish-line band, nested in the gauge's lower opening -->
  <g clip-path="url(#round)">
    <g fill="#FFFFFF" opacity="0.20">
      <rect x="168" y="338" width="22" height="22"/>
      <rect x="212" y="338" width="22" height="22"/>
      <rect x="256" y="338" width="22" height="22"/>
      <rect x="300" y="338" width="22" height="22"/>
      <rect x="190" y="360" width="22" height="22"/>
      <rect x="234" y="360" width="22" height="22"/>
      <rect x="278" y="360" width="22" height="22"/>
      <rect x="322" y="360" width="22" height="22"/>
    </g>
  </g>

  <!-- Gauge track (270°, open at the bottom) -->
  <path d="M 150 342 A 150 150 0 1 1 362 342"
        fill="none" stroke="#46464C" stroke-width="22" stroke-linecap="round"/>
  <!-- Gauge progress (~70%) in brand coral -->
  <path d="M 150 342 A 150 150 0 1 1 377 148"
        fill="none" stroke="url(#arc)" stroke-width="22" stroke-linecap="round"/>

  <!-- Needle + hub -->
  <line x1="256" y1="236" x2="349" y2="170"
        stroke="#FFFFFF" stroke-width="11" stroke-linecap="round"/>
  <circle cx="256" cy="236" r="21" fill="#FFFFFF"/>
  <circle cx="256" cy="236" r="9" fill="#CE6841"/>
</svg>
